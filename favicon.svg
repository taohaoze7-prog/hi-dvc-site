<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Cinnabar seal background with inner border -->
  <rect x="2" y="2" width="60" height="60" fill="#b8201c"/>
  <rect x="6" y="6" width="52" height="52" fill="none" stroke="#f4ecd8" stroke-width="1.5"/>
  <rect x="8" y="8" width="48" height="48" fill="#b8201c" stroke="#f4ecd8" stroke-width="0.5"/>
  <!-- 2x2 character grid: 文 韻 智 行 -->
  <g fill="#f4ecd8" font-family="'Noto Serif SC', 'SimSun', serif" font-size="16" font-weight="700" text-anchor="middle" dominant-baseline="central">
    <text x="20" y="22">文</text>
    <text x="44" y="22">韻</text>
    <text x="20" y="44">智</text>
    <text x="44" y="44">行</text>
  </g>
  <!-- Divider lines for seal aesthetic -->
  <line x1="32" y1="10" x2="32" y2="54" stroke="#f4ecd8" stroke-width="0.6" opacity="0.3"/>
  <line x1="10" y1="32" x2="54" y2="32" stroke="#f4ecd8" stroke-width="0.6" opacity="0.3"/>
</svg>
